# 用户自定义配置
# 只需要填写你想修改的配置项
# 其他配置将使用系统默认值（default_config.yaml）

# 基金列表（修改为你自己的基金）
funds:
  - code: "110011"
    name: "易方达中小盘混合"
    monthly_invest: 200
    enabled: true
  - code: "161725"
    name: "招商中证白酒指数"
    monthly_invest: 300
    enabled: true

# 通知配置（配置你的钉钉机器人）
notification:
  enabled: true
  method: "dingtalk"
  dingtalk:
    webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=your_token"
    secret: "your_secret"

# 新闻情绪 API 配置（与 TrendRadar 项目对接）
news_api:
  enabled: true
  host: "0.0.0.0"
  port: 5000
  api_key: ""
