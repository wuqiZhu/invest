<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资决策助手 - 仪表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }
        
        .stat-value.positive {
            color: #10b981;
        }
        
        .stat-value.negative {
            color: #ef4444;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .fund-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        
        .fund-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }
        
        .fund-card.warning {
            border-left-color: #f59e0b;
        }
        
        .fund-card.danger {
            border-left-color: #ef4444;
        }
        
        .fund-card h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1em;
        }
        
        .fund-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 0.9em;
        }
        
        .fund-info .label {
            color: #666;
        }
        
        .fund-info .value {
            text-align: right;
            font-weight: 600;
        }
        
        .profit-positive {
            color: #10b981;
        }
        
        .profit-negative {
            color: #ef4444;
        }
        
        .decision-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .decision-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .decision-item:last-child {
            border-bottom: none;
        }
        
        .decision-action {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .decision-action.buy {
            background: #d1fae5;
            color: #065f46;
        }
        
        .decision-action.sell {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .decision-action.hold {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .decision-meta {
            text-align: right;
            font-size: 0.85em;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #5a6fd6;
        }
        
        .timestamp {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #999;
        }
        
        .empty-state p {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 智能投资决策助手</h1>
            <p>实时监控 · 智能决策 · 风险控制</p>
            <button class="refresh-btn" onclick="refreshData()" style="margin-top: 15px;">
                🔄 刷新数据
            </button>
        </div>
        
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <h3>总资产</h3>
                <div class="stat-value" id="total-assets">加载中...</div>
            </div>
            <div class="stat-card">
                <h3>总收益</h3>
                <div class="stat-value" id="total-profit">加载中...</div>
            </div>
            <div class="stat-card">
                <h3>收益率</h3>
                <div class="stat-value" id="profit-rate">加载中...</div>
            </div>
            <div class="stat-card">
                <h3>持仓基金</h3>
                <div class="stat-value" id="fund-count">加载中...</div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="left-column">
                <div class="card">
                    <h2>📊 持仓详情</h2>
                    <div class="fund-grid" id="fund-grid">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>加载基金数据...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="right-column">
                <div class="card">
                    <h2>🎯 最新决策</h2>
                    <div class="decision-list" id="decision-list">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>加载决策数据...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="timestamp" id="update-time">
            数据加载中...
        </div>
    </div>
    
    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                updateStats(data);
            } catch (error) {
                console.error('获取统计数据失败:', error);
            }
        }
        
        async function fetchPortfolio() {
            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();
                updateFundGrid(data);
            } catch (error) {
                console.error('获取投资组合失败:', error);
            }
        }
        
        async function fetchDecisions() {
            try {
                const response = await fetch('/api/decisions');
                const data = await response.json();
                updateDecisions(data);
            } catch (error) {
                console.error('获取决策失败:', error);
            }
        }
        
        function updateStats(data) {
            if (data.error) {
                document.getElementById('total-assets').textContent = '错误';
                return;
            }
            
            document.getElementById('total-assets').textContent = 
                '¥' + (data.total_assets || 0).toFixed(2);
            
            const profitEl = document.getElementById('total-profit');
            const profit = data.total_profit || 0;
            profitEl.textContent = (profit >= 0 ? '+' : '') + '¥' + profit.toFixed(2);
            profitEl.className = 'stat-value ' + (profit >= 0 ? 'positive' : 'negative');
            
            const rateEl = document.getElementById('profit-rate');
            const rate = data.profit_rate || 0;
            rateEl.textContent = (rate >= 0 ? '+' : '') + rate.toFixed(2) + '%';
            rateEl.className = 'stat-value ' + (rate >= 0 ? 'positive' : 'negative');
            
            document.getElementById('fund-count').textContent = (data.total_funds || 0) + '只';
        }
        
        function updateFundGrid(data) {
            const grid = document.getElementById('fund-grid');
            const holdings = data.holdings || [];
            
            if (holdings.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>暂无持仓数据</p></div>';
                return;
            }
            
            let html = '';
            holdings.forEach(h => {
                const marketValue = h.shares * h.current_nav;
                const profit = marketValue - (h.shares * h.avg_cost);
                const profitRate = h.avg_cost > 0 ? (profit / (h.shares * h.avg_cost) * 100) : 0;
                
                let cardClass = 'fund-card';
                if (profitRate <= -10) cardClass += ' danger';
                else if (profitRate <= -5) cardClass += ' warning';
                
                html += `
                    <div class="${cardClass}">
                        <h4>${h.fund_code} ${h.fund_name || ''}</h4>
                        <div class="fund-info">
                            <span class="label">当前净值:</span>
                            <span class="value">${h.current_nav ? h.current_nav.toFixed(4) : '-'}</span>
                            
                            <span class="label">持仓份额:</span>
                            <span class="value">${h.shares.toFixed(2)}</span>
                            
                            <span class="label">持仓成本:</span>
                            <span class="value">¥${(h.shares * h.avg_cost).toFixed(2)}</span>
                            
                            <span class="label">市值:</span>
                            <span class="value">¥${marketValue.toFixed(2)}</span>
                            
                            <span class="label">盈亏:</span>
                            <span class="value ${profit >= 0 ? 'profit-positive' : 'profit-negative'}">
                                ${profit >= 0 ? '+' : ''}¥${profit.toFixed(2)} (${profitRate >= 0 ? '+' : ''}${profitRate.toFixed(2)}%)
                            </span>
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }
        
        function updateDecisions(data) {
            const list = document.getElementById('decision-list');
            const decisions = data.decisions || [];
            
            if (decisions.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>暂无决策记录</p></div>';
                return;
            }
            
            let html = '';
            decisions.slice(0, 10).forEach(d => {
                const actionClass = d.action === 'buy' ? 'buy' : d.action === 'sell' ? 'sell' : 'hold';
                const actionText = d.action === 'buy' ? '买入' : d.action === 'sell' ? '卖出' : '持有';
                
                html += `
                    <div class="decision-item">
                        <div>
                            <span class="decision-action ${actionClass}">${actionText}</span>
                            <span style="margin-left: 10px; font-weight: 600;">${d.fund_code}</span>
                            <span style="margin-left: 8px; color: #666; font-size: 0.9em;">
                                评分: ${d.score ? (d.score * 100).toFixed(1) + '%' : '-'}
                            </span>
                        </div>
                        <div class="decision-meta">
                            ${d.date || ''}
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }
        
        async function refreshData() {
            await Promise.all([fetchStats(), fetchPortfolio(), fetchDecisions()]);
            document.getElementById('update-time').textContent = 
                '最后更新: ' + new Date().toLocaleString('zh-CN');
        }
        
        refreshData();
        setInterval(refreshData, 5 * 60 * 1000);
    </script>
</body>
</html>
